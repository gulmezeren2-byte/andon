name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Windows is a first-class target: that's where the Excel files live.
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: uv sync --dev --extra duckdb --extra mcp   # so the DuckDB-source and MCP tests run, not skip

      - name: Lint
        run: uv run ruff check src tests

      - name: Types
        run: uv run mypy src

      - name: Tests
        run: uv run pytest

      - name: Example must fail the way the README says it does
        shell: bash
        run: |
          cd examples/quarterly-report
          set +e
          uv run andon run andon.yaml
          code=$?
          set -e
          if [ "$code" -ne 1 ]; then
            echo "expected exit 1 from the sabotaged example, got $code"
            exit 1
          fi
